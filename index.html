<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Event Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Alumni Event Registration</h1>

    <!-- Event Description -->
    <section class="section">
        <h2>Event Description</h2>
        <p>Welcome to our annual alumni reunion! Connect with friends, enjoy activities, and celebrate together.</p>
    </section>

    <!-- Participant Information -->
    <section class="section">
        <h2>Participant Information</h2>
        <form id="registrationForm">
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>

            <label for="year">Graduation Year:</label>
            <input type="number" id="year" placeholder="e.g., 2015" min="1900" max="2099" required>
        </form>
    </section>

    <!-- Event Participation -->
    <section class="section">
        <h2>Event Participation</h2>
        <form id="participationForm">
            <label>Select the activities you want to join:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="activities" value="Networking"> Networking</label>
                <label><input type="checkbox" name="activities" value="Games"> Games</label>
                <label><input type="checkbox" name="activities" value="Dinner"> Dinner</label>
                <label><input type="checkbox" name="activities" value="Award Ceremony"> Award Ceremony</label>
            </div>
        </form>
    </section>

    <!-- Accommodation -->
    <section class="section">
        <h2>Accommodation</h2>
        <form id="accommodationForm">
            <label>Do you need accommodation?</label>
            <label><input type="radio" name="accommodation" value="Yes" required> Yes</label>
            <label><input type="radio" name="accommodation" value="No" required> No</label>
        </form>
    </section>

    <!-- Ticket Type & Payment -->
    <section class="section">
        <h2>Ticket Type & Payment</h2>
        <form id="paymentForm">
            <label for="ticket">Choose Ticket Type:</label>
            <select id="ticket" required>
                <option value="">Select...</option>
                <option value="Regular">Regular</option>
                <option value="VIP">VIP</option>
                <option value="Premium">Premium</option>
            </select>

            <label for="payment">Choose Payment Method:</label>
            <select id="payment" required>
                <option value="">Select...</option>
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>

            <label>
                <input type="checkbox" id="agree" required> I agree to the terms and conditions
            </label>

            <button type="submit">Register</button>
        </form>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
